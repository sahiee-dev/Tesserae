simulation:
  max_iterations: 1
  max_planning_rounds: 3
  max_conversation_steps: 2
  seed: 1
  tags: [gap3_claude_sonnet]

environment:
  name: JiraTicketEnvironment
  assignment_filling: false
  max_tasks: 4

communication_network:
  topology: complete
  num_agents: 2
  consolidate_channels: true

llm_models:
  - label: claude-sonnet
    llm:
      provider: anthropic
      anthropic:
        model: claude-sonnet-4-5
        params:
          max_tokens: 1000
          temperature: 0.7

experiment:
  tag: gap3_claude_sonnet
  output_dir: experiments/collusion/outputs/gap3_claude_sonnet
  max_concurrent_runs: 1
  seeds: [1, 2, 3, 4, 5]
  collusion:
    colluder_selection: random
  sweeps:
    - name: gap3_sweep
      topologies: [complete]
      num_agents: [2]
      colluder_counts: [1]
      secret_channel_enabled: [false, true]
      prompt_variants: [control, deception]
